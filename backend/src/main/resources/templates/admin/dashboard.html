<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>校园书环 - 管理后台</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">📚 校园书环</div>
            </div>
            <nav class="nav">
                <a th:href="@{/admin}" class="nav-link active">
                    <span>📊</span> 数据概览
                </a>
                <a th:href="@{/admin/users}" class="nav-link">
                    <span>👥</span> 用户管理
                </a>
                <a th:href="@{/admin/books}" class="nav-link">
                    <span>📖</span> 书籍管理
                </a>
                <a th:href="@{/admin/orders}" class="nav-link">
                    <span>📦</span> 订单管理
                </a>
                <a th:href="@{/admin/verifications}" class="nav-link">
                    <span>✅</span> 认证审核
                </a>
                <a th:href="@{/admin/wanted}" class="nav-link">
                    <span>📢</span> 求购管理
                </a>
            </nav>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="topbar animate-in">
                <h1 class="page-title">数据概览</h1>
                <div class="user-profile">
                    <span style="font-size: 0.875rem; font-weight: 600; color: var(--slate-600);">管理员</span>
                    <div class="avatar">A</div>
                </div>
            </div>

            <div class="stats-grid animate-in">
                <div class="stat-card">
                    <div class="stat-icon" style="background: #e0f2fe; color: #0284c7;">👥</div>
                    <div class="stat-value" th:text="${userCount}">0</div>
                    <div class="stat-label">注册用户</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #dcfce7; color: #166534;">📖</div>
                    <div class="stat-value" th:text="${bookCount}">0</div>
                    <div class="stat-label">上架书籍</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #ffedd5; color: #c2410c;">📦</div>
                    <div class="stat-value" th:text="${orderCount}">0</div>
                    <div class="stat-label">总订单数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #f3e8ff; color: #7e22ce;">📢</div>
                    <div class="stat-value" th:text="${wantedCount}">0</div>
                    <div class="stat-label">求购信息</div>
                </div>
                <div class="stat-card">
                    <div class="stat-icon" style="background: #fee2e2; color: #b91c1c;">⏳</div>
                    <div class="stat-value" th:text="${pendingVerifications}">0</div>
                    <div class="stat-label">待审核认证</div>
                </div>
            </div>

            <!-- Chart Card -->
            <div class="card animate-in" style="margin-top: 1.5rem;">
                <div class="card-header">
                    <h2 class="card-title">📈 订单趋势 (近7天)</h2>
                </div>
                <div style="height: 300px; padding: 1rem;">
                    <canvas id="orderChart"></canvas>
                </div>
            </div>

            <div class="card animate-in" style="animation-delay: 0.1s;">
                <div class="card-header">
                    <div class="card-title">🚀 快捷操作中心</div>
                </div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem;">
                    <a th:href="@{/admin/users}" class="btn btn-primary"
                        style="justify-content: center; padding: 1.5rem;">
                        <span style="font-size: 1.25rem;">👥</span>
                        <span>用户管理</span>
                    </a>
                    <a th:href="@{/admin/books}" class="btn btn-primary"
                        style="background: #0ea5e9; justify-content: center; padding: 1.5rem;">
                        <span style="font-size: 1.25rem;">📖</span>
                        <span>书籍管理</span>
                    </a>
                    <a th:href="@{/admin/verifications}" class="btn btn-primary"
                        style="background: #f59e0b; justify-content: center; padding: 1.5rem;">
                        <span style="font-size: 1.25rem;">✅</span>
                        <span>认证审核</span>
                    </a>
                </div>
            </div>

            <div style="text-align: center; padding: 2rem; color: var(--slate-400); font-size: 0.875rem;">
                Campus Book Loop &copy; 2024
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script th:inline="javascript">
        const ctx = document.getElementById('orderChart').getContext('2d');
        const dates = [[${ chartDates }]];
        const data = [[${ chartData }]];

        new Chart(ctx, {
            type: 'line',
            data: {
                labels: dates,
                datasets: [{
                    label: '每日订单数',
                    data: data,
                    borderColor: '#10b981',
                    backgroundColor: 'rgba(16, 185, 129, 0.1)',
                    borderWidth: 2,
                    tension: 0.3,
                    fill: true,
                    pointBackgroundColor: '#fff',
                    pointBorderColor: '#10b981',
                    pointBorderWidth: 2,
                    pointRadius: 4,
                    pointHoverRadius: 6
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    },
                    tooltip: {
                        mode: 'index',
                        intersect: false,
                        backgroundColor: 'rgba(255, 255, 255, 0.9)',
                        titleColor: '#1e293b',
                        bodyColor: '#10b981',
                        bodyFont: {
                            weight: 'bold'
                        },
                        borderColor: '#e2e8f0',
                        borderWidth: 1,
                        padding: 10,
                        displayColors: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        grid: {
                            color: '#f1f5f9',
                            drawBorder: false
                        },
                        ticks: {
                            stepSize: 1,
                            color: '#64748b'
                        }
                    },
                    x: {
                        grid: {
                            display: false
                        },
                        ticks: {
                            color: '#64748b'
                        }
                    }
                },
                interaction: {
                    mode: 'nearest',
                    axis: 'x',
                    intersect: false
                }
            }
        });
    </script>
</body>

</html>
