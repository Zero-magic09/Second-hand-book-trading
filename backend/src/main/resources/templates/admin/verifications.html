<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>认证审核 - 校园书环</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">📚 校园书环</div>
            </div>
            <nav class="nav">
                <a th:href="@{/admin}" class="nav-link"><span>📊</span> 数据概览</a>
                <a th:href="@{/admin/users}" class="nav-link"><span>👥</span> 用户管理</a>
                <a th:href="@{/admin/books}" class="nav-link"><span>📖</span> 书籍管理</a>
                <a th:href="@{/admin/orders}" class="nav-link"><span>📦</span> 订单管理</a>
                <a th:href="@{/admin/verifications}" class="nav-link active"><span>✅</span> 认证审核</a>
                <a th:href="@{/admin/wanted}" class="nav-link"><span>📢</span> 求购管理</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="topbar animate-in">
                <h1 class="page-title">认证审核</h1>
                <div class="user-profile">
                    <span style="font-size: 0.875rem; font-weight: 600; color: var(--slate-600);">管理员</span>
                    <div class="avatar">A</div>
                </div>
            </div>

            <!-- 页面特定样式 -->
            <style>
                .status-nav {
                    display: flex;
                    gap: 0.5rem;
                    padding: 0.25rem;
                    background-color: #f8fafc;
                    border-radius: 1rem;
                    border: 1px solid #e2e8f0;
                    display: inline-flex;
                    /* 让容器适应内容宽度 */
                }

                .nav-item {
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                    padding: 0.5rem 1.25rem;
                    border-radius: 0.75rem;
                    text-decoration: none;
                    font-size: 0.875rem;
                    font-weight: 600;
                    color: #64748b;
                    transition: all 0.2s ease;
                    position: relative;
                }

                .nav-item:hover {
                    color: #1e293b;
                    background-color: rgba(255, 255, 255, 0.5);
                }

                .nav-item.active {
                    background-color: white;
                    color: #0f172a;
                    box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
                }

                /* 状态指示点 */
                .status-dot {
                    width: 0.5rem;
                    height: 0.5rem;
                    border-radius: 50%;
                    background-color: #cbd5e1;
                    transition: background-color 0.2s;
                }

                .nav-item.active .status-dot.all {
                    background-color: #0f172a;
                }

                .nav-item.active .status-dot.pending {
                    background-color: #f59e0b;
                    box-shadow: 0 0 0 2px rgba(245, 158, 11, 0.2);
                }

                .nav-item.active .status-dot.approved {
                    background-color: #10b981;
                    box-shadow: 0 0 0 2px rgba(16, 185, 129, 0.2);
                }

                .nav-item.active .status-dot.rejected {
                    background-color: #ef4444;
                    box-shadow: 0 0 0 2px rgba(239, 68, 68, 0.2);
                }

                /* 数字徽章 */
                .status-count {
                    font-size: 0.75rem;
                    padding: 0.125rem 0.375rem;
                    border-radius: 9999px;
                    background-color: #f1f5f9;
                    color: #64748b;
                    font-weight: 700;
                    transition: all 0.2s;
                }

                .nav-item.active .status-count {
                    background-color: #f1f5f9;
                    color: #0f172a;
                }

                /* 特殊激活态文字颜色 */
                .nav-item.active.type-pending {
                    color: #d97706;
                }

                .nav-item.active.type-pending .status-count {
                    background-color: #fffbeb;
                    color: #d97706;
                }

                .nav-item.active.type-approved {
                    color: #059669;
                }

                .nav-item.active.type-approved .status-count {
                    background-color: #ecfdf5;
                    color: #059669;
                }

                .nav-item.active.type-rejected {
                    color: #dc2626;
                }

                .nav-item.active.type-rejected .status-count {
                    background-color: #fef2f2;
                    color: #dc2626;
                }
            </style>

            <div class="card animate-in">
                <!-- 筛选标签栏 - 分段控制器风格 -->
                <div style="padding: 1.5rem; border-bottom: 1px solid #f1f5f9; background: #fff;">
                    <nav class="status-nav">
                        <a th:href="@{/admin/verifications}" class="nav-item"
                            th:classappend="${currentStatus == null ? 'active' : ''}">
                            <span class="status-dot all"></span>
                            <span>全部</span>
                            <span class="status-count"
                                th:text="${pendingCount + approvedCount + rejectedCount}">0</span>
                        </a>

                        <a th:href="@{/admin/verifications(status=1)}" class="nav-item type-pending"
                            th:classappend="${currentStatus != null && currentStatus == 1 ? 'active' : ''}">
                            <span class="status-dot pending"></span>
                            <span>待审核</span>
                            <span class="status-count" th:text="${pendingCount}">0</span>
                        </a>

                        <a th:href="@{/admin/verifications(status=2)}" class="nav-item type-approved"
                            th:classappend="${currentStatus != null && currentStatus == 2 ? 'active' : ''}">
                            <span class="status-dot approved"></span>
                            <span>已通过</span>
                            <span class="status-count" th:text="${approvedCount}">0</span>
                        </a>

                        <a th:href="@{/admin/verifications(status=3)}" class="nav-item type-rejected"
                            th:classappend="${currentStatus != null && currentStatus == 3 ? 'active' : ''}">
                            <span class="status-dot rejected"></span>
                            <span>已拒绝</span>
                            <span class="status-count" th:text="${rejectedCount}">0</span>
                        </a>
                    </nav>
                </div>

                <div class="card-header">
                    <h2 class="card-title">认证审核记录</h2>
                    <div class="badge badge-warning" th:if="${pendingCount != null && pendingCount > 0}"
                        th:text="'待审核 ' + ${pendingCount} + ' 个'">待审核 0 个</div>
                </div>

                <div th:if="${allVerifications == null || allVerifications.isEmpty()}" class="empty-state">
                    <div class="empty-icon">✅</div>
                    <p>暂无认证记录</p>
                </div>

                <div class="book-grid" th:unless="${allVerifications == null || allVerifications.isEmpty()}"
                    style="grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));">
                    <div class="card" th:each="user : ${allVerifications}" th:if="${user != null}"
                        style="border: 1px solid var(--slate-200); box-shadow: none; margin-bottom: 0;">
                        <div style="display: flex; gap: 1rem; margin-bottom: 1rem; align-items: start;">
                            <div class="avatar"
                                style="width: 3rem; height: 3rem; font-size: 1.25rem; overflow: hidden;">
                                <img th:if="${user.avatarUrl != null && user.avatarUrl != ''}"
                                    th:src="${user.avatarUrl.contains('/api/uploads/') ? user.avatarUrl.replace('/api/uploads/', '/uploads/') : user.avatarUrl}"
                                    alt="头像" style="width: 100%; height: 100%; object-fit: cover;">
                                <span th:unless="${user.avatarUrl != null && user.avatarUrl != ''}"
                                    th:text="${user.nickname != null ? user.nickname.substring(0,1) : 'U'}">U</span>
                            </div>
                            <div style="flex: 1;">
                                <div
                                    style="display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.375rem; flex-wrap: wrap;">
                                    <div style="font-weight: 700; color: var(--slate-900); font-size: 1.125rem;"
                                        th:text="${user.nickname ?: '未设置昵称'}">用户昵称</div>
                                    <!-- 优化的状态标签 -->
                                    <span th:if="${user.verificationStatus == 1}"
                                        style="padding: 0.375rem 0.875rem; background: linear-gradient(135deg, #fef3c7, #fde68a); color: #92400e; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; border: 1.5px solid #fbbf24; box-shadow: 0 2px 4px rgba(251, 191, 36, 0.2); display: inline-flex; align-items: center; gap: 0.375rem;">
                                        <span
                                            style="width: 6px; height: 6px; border-radius: 50%; background-color: #f59e0b; animation: pulse 2s infinite;"></span>
                                        待审核
                                    </span>
                                    <span th:if="${user.verificationStatus == 2}"
                                        style="padding: 0.375rem 0.875rem; background: linear-gradient(135deg, #d1fae5, #a7f3d0); color: #065f46; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; border: 1.5px solid #10b981; box-shadow: 0 2px 4px rgba(16, 185, 129, 0.2); display: inline-flex; align-items: center; gap: 0.375rem;">
                                        <span style="font-size: 0.875rem;">✓</span>
                                        已认证
                                    </span>
                                    <span th:if="${user.verificationStatus == 3}"
                                        style="padding: 0.375rem 0.875rem; background: linear-gradient(135deg, #fee2e2, #fecaca); color: #7f1d1d; border-radius: 9999px; font-size: 0.75rem; font-weight: 700; border: 1.5px solid #ef4444; box-shadow: 0 2px 4px rgba(239, 68, 68, 0.2); display: inline-flex; align-items: center; gap: 0.375rem;">
                                        <span style="font-size: 0.875rem;">✗</span>
                                        已拒绝
                                    </span>
                                </div>
                                <div style="color: var(--slate-400); font-size: 0.875rem;"
                                    th:text="'ID: ' + ${user.id}">ID: 1</div>
                            </div>
                        </div>

                        <div
                            style="background: var(--slate-50); padding: 1rem; border-radius: var(--radius-lg); margin-bottom: 1.5rem;">
                            <div
                                style="display: grid; grid-template-columns: auto 1fr; gap: 0.5rem 1rem; font-size: 0.875rem;">
                                <span style="color: var(--slate-500);">真实姓名:</span>
                                <span style="font-weight: 600;" th:text="${user.realName ?: '未填写'}">张三</span>

                                <span style="color: var(--slate-500);">所在学校:</span>
                                <span style="font-weight: 600;" th:text="${user.school ?: '未填写'}">示例大学</span>

                                <span style="color: var(--slate-500);">学号:</span>
                                <span style="font-weight: 600; font-family: monospace;"
                                    th:text="${user.studentId ?: '未填写'}">2021001</span>
                            </div>
                        </div>

                        <div th:if="${user.studentIdCardUrl != null and !#strings.isEmpty(user.studentIdCardUrl)}"
                            style="margin-bottom: 1.5rem; border-radius: 0.75rem; overflow: hidden; border: 1px solid var(--slate-200);">
                            <img th:src="${user.studentIdCardUrl != null && user.studentIdCardUrl.contains('/api/uploads/') ? user.studentIdCardUrl.replace('/api/uploads/', '/uploads/') : user.studentIdCardUrl}"
                                alt="学生证照片" style="width: 100%; height: 200px; object-fit: cover; display: block;"
                                onclick="window.open(this.src)">
                            <div
                                style="padding: 0.5rem; background: var(--slate-50); font-size: 0.75rem; color: var(--slate-500); text-align: center;">
                                点击查看大图
                            </div>
                        </div>

                        <!-- 仅待审核状态显示操作按钮 -->
                        <div th:if="${user.verificationStatus == 1}"
                            style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                            <form th:action="@{/admin/verifications/{id}/reject(id=${user.id})}" method="post"
                                style="display:block;">
                                <button type="submit" class="btn btn-danger btn-outline"
                                    style="width: 100%; justify-content: center;">✗ 拒绝</button>
                            </form>
                            <form th:action="@{/admin/verifications/{id}/approve(id=${user.id})}" method="post"
                                style="display:block;">
                                <button type="submit" class="btn btn-primary"
                                    style="width: 100%; justify-content: center;">✓ 通过</button>
                            </form>
                        </div>

                        <!-- 已处理状态显示结果提示 -->
                        <div th:if="${user.verificationStatus == 2}"
                            style="padding: 0.75rem; background-color: #ecfdf5; border-radius: 0.5rem; text-align: center; color: #059669; font-size: 0.875rem;">
                            ✓ 已审核通过
                        </div>
                        <div th:if="${user.verificationStatus == 3}"
                            style="padding: 0.75rem; background-color: #fef2f2; border-radius: 0.5rem; text-align: center; color: #dc2626; font-size: 0.875rem;">
                            ✗ 已审核拒绝
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
