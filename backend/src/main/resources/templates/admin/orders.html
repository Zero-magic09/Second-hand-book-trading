<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订单管理 - 校园书环</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">📚 校园书环</div>
            </div>
            <nav class="nav">
                <a th:href="@{/admin}" class="nav-link"><span>📊</span> 数据概览</a>
                <a th:href="@{/admin/users}" class="nav-link"><span>👥</span> 用户管理</a>
                <a th:href="@{/admin/books}" class="nav-link"><span>📖</span> 书籍管理</a>
                <a th:href="@{/admin/orders}" class="nav-link active"><span>📦</span> 订单管理</a>
                <a th:href="@{/admin/verifications}" class="nav-link"><span>✅</span> 认证审核</a>
                <a th:href="@{/admin/wanted}" class="nav-link"><span>📢</span> 求购管理</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="topbar animate-in">
                <h1 class="page-title">订单管理</h1>
                <div class="user-profile">
                    <span style="font-size: 0.875rem; font-weight: 600; color: var(--slate-600);">管理员</span>
                    <div class="avatar">A</div>
                </div>
            </div>

            <div class="card animate-in">
                <div class="card-header">
                    <h2 class="card-title">订单列表</h2>
                    <div class="search-group">
                        <form th:action="@{/admin/orders}" method="get" class="search-group">
                            <input type="text" name="orderId" class="form-input" placeholder="搜索订单号..."
                                th:value="${orderId}">
                            <select name="status" class="form-input" style="width: 140px; cursor: pointer;">
                                <option value="">全部状态</option>
                                <option value="0" th:selected="${status == 0}">待付款</option>
                                <option value="1" th:selected="${status == 1}">待发货</option>
                                <option value="2" th:selected="${status == 2}">待收货</option>
                                <option value="3" th:selected="${status == 3}">已完成</option>
                                <option value="4" th:selected="${status == 4}">已取消</option>
                            </select>
                            <button type="submit" class="btn btn-primary">🔍 搜索</button>
                            <a th:href="@{/admin/orders}" class="btn btn-outline" style="min-width: fit-content;">重置</a>
                        </form>
                    </div>
                </div>

                <div th:if="${orders == null || orders.isEmpty()}" class="empty-state">
                    <div class="empty-icon">📦</div>
                    <p>暂无订单数据，请尝试调整搜索条件</p>
                </div>

                <div class="table-container" th:unless="${orders == null || orders.isEmpty()}">
                    <table>
                        <thead>
                            <tr>
                                <th>订单号</th>
                                <th>书籍信息</th>
                                <th>买家</th>
                                <th>金额</th>
                                <th>状态</th>
                                <th>创建时间</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="order : ${orders}">
                                <td style="font-family: monospace; font-weight: 600;" th:text="${order.id}">1</td>
                                <td>
                                    <div style="font-weight: 500; color: var(--slate-900);"
                                        th:text="${order.book != null ? order.book.title : '-'}">书籍标题</div>
                                </td>
                                <td>
                                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                                        <div class="avatar"
                                            style="width: 1.5rem; height: 1.5rem; font-size: 0.75rem; overflow: hidden;">
                                            <img th:if="${order.buyer != null && order.buyer.avatarUrl != null && order.buyer.avatarUrl != ''}"
                                                th:src="${order.buyer.avatarUrl.contains('/api/uploads/') ? order.buyer.avatarUrl.replace('/api/uploads/', '/uploads/') : order.buyer.avatarUrl}"
                                                alt="头像" style="width: 100%; height: 100%; object-fit: cover;">
                                            <span
                                                th:unless="${order.buyer != null && order.buyer.avatarUrl != null && order.buyer.avatarUrl != ''}"
                                                th:text="${order.buyer != null && order.buyer.nickname != null ? order.buyer.nickname.substring(0,1) : 'U'}">U</span>
                                        </div>
                                        <span th:text="${order.buyer != null ? order.buyer.nickname : '-'}">买家</span>
                                    </div>
                                </td>
                                <td style="font-weight: 700; color: var(--primary-dark);"
                                    th:text="'¥' + ${#numbers.formatDecimal(order.price, 1, 2)}">¥0.00</td>
                                <td>
                                    <span class="badge badge-warning" th:if="${order.status == 0}">⏳ 待付款</span>
                                    <span class="badge badge-info" th:if="${order.status == 1}">📦 待发货</span>
                                    <span class="badge badge-info" th:if="${order.status == 2}">🚚 待收货</span>
                                    <span class="badge badge-success" th:if="${order.status == 3}">✅ 已完成</span>
                                    <span class="badge badge-neutral" th:if="${order.status == 4}">✕ 已取消</span>
                                </td>
                                <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}"
                                    style="font-variant-numeric: tabular-nums;">2024-01-01</td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <div style="margin-top: 2rem; text-align: center; color: var(--slate-400); font-size: 0.875rem;"
                    th:if="${orders != null && !orders.isEmpty()}">
                    共找到 <span th:text="${#lists.size(orders)}">0</span> 个订单
                </div>
            </div>
        </div>
    </div>
</body>

</html>
