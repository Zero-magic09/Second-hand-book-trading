<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>新增用户 - 校园书环</title>
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>

<body>
    <div class="app-container">
        <div class="sidebar">
            <div class="sidebar-header">
                <div class="logo">📚 校园书环</div>
            </div>
            <nav class="nav">
                <a th:href="@{/admin}" class="nav-link"><span>📊</span> 数据概览</a>
                <a th:href="@{/admin/users}" class="nav-link active"><span>👥</span> 用户管理</a>
                <a th:href="@{/admin/books}" class="nav-link"><span>📖</span> 书籍管理</a>
                <a th:href="@{/admin/orders}" class="nav-link"><span>📦</span> 订单管理</a>
                <a th:href="@{/admin/verifications}" class="nav-link"><span>✅</span> 认证审核</a>
                <a th:href="@{/admin/wanted}" class="nav-link"><span>📢</span> 求购管理</a>
            </nav>
        </div>

        <div class="main-content">
            <div class="topbar animate-in">
                <h1 class="page-title">新增用户</h1>
                <div class="user-profile">
                    <span style="font-size: 0.875rem; font-weight: 600; color: var(--slate-600);">管理员</span>
                    <div class="avatar">A</div>
                </div>
            </div>

            <div class="card animate-in" style="max-width: 800px; margin: 0 auto;">
                <div class="card-header">
                    <h2 class="card-title">填写用户信息</h2>
                </div>

                <form th:action="@{/admin/users/add}" method="post">
                    <div class="form-group">
                        <label class="form-label">昵称 <span class="required">*</span></label>
                        <input type="text" name="nickname" class="form-input" placeholder="请输入用户昵称" required>
                    </div>

                    <div class="form-group">
                        <label class="form-label">手机号</label>
                        <input type="text" name="phone" class="form-input" placeholder="请输入手机号">
                    </div>

                    <div class="form-group">
                        <label class="form-label">学校</label>
                        <input type="text" name="school" class="form-input" placeholder="请输入学校名称">
                    </div>

                    <div class="form-group">
                        <label class="form-label">学号</label>
                        <input type="text" name="studentId" class="form-input" placeholder="请输入学号">
                    </div>

                    <div class="form-group">
                        <label class="form-label">头像图片</label>
                        <div class="image-upload-area">
                            <input type="file" id="avatarFile" accept="image/*" style="display:none;"
                                onchange="uploadAvatar(this)">
                            <input type="hidden" name="avatarUrl" id="avatarUrl">
                            <div id="avatarPreview" class="image-preview" style="display:none;">
                                <img id="avatarPreviewImg" src="" alt="头像预览">
                                <button type="button" class="remove-btn" onclick="removeAvatar()">×</button>
                            </div>
                            <button type="button" class="btn btn-primary btn-sm" id="avatarUploadBtn"
                                style="margin-top: 1rem;" onclick="document.getElementById('avatarFile').click()">
                                📷 上传头像
                            </button>
                            <div class="form-hint">支持 JPG、PNG 格式，最大 5MB</div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a th:href="@{/admin/users}" class="btn btn-outline">取消</a>
                        <button type="submit" class="btn btn-primary">✓ 确认添加</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script th:inline="javascript">
        // 上传头像
        function uploadAvatar(input) {
            if (input.files && input.files[0]) {
                const file = input.files[0];

                // 检查文件大小
                if (file.size > 5 * 1024 * 1024) {
                    alert('图片大小不能超过 5MB');
                    return;
                }

                const formData = new FormData();
                formData.append('file', file);

                // 显示上传中状态
                document.getElementById('avatarUploadBtn').textContent = '⭐ 上传中...';
                document.getElementById('avatarUploadBtn').disabled = true;

                fetch('/api/upload/image', {
                    method: 'POST',
                    body: formData
                })
                    .then(response => response.json())
                    .then(data => {
                        if (data.code === 0) {
                            document.getElementById('avatarUrl').value = data.url;
                            document.getElementById('avatarPreviewImg').src = data.url;
                            document.getElementById('avatarPreview').style.display = 'inline-block';
                            document.getElementById('avatarUploadBtn').style.display = 'none';
                        } else {
                            alert('上传失败: ' + data.message);
                        }
                    })
                    .catch(error => {
                        alert('上传失败: ' + error.message);
                    })
                    .finally(() => {
                        document.getElementById('avatarUploadBtn').textContent = '📷 上传头像';
                        document.getElementById('avatarUploadBtn').disabled = false;
                    });
            }
        }

        // 移除头像
        function removeAvatar() {
            document.getElementById('avatarUrl').value = '';
            document.getElementById('avatarPreviewImg').src = '';
            document.getElementById('avatarPreview').style.display = 'none';
            document.getElementById('avatarUploadBtn').style.display = 'inline-block';
            document.getElementById('avatarFile').value = '';
        }
    </script>
</body>

</html>
